name: Install verified Club Dynasty v20

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: read

jobs:
  install:
    if: github.event.pull_request.head.ref == 'agent/install-club-dynasty-v20-verified'
    runs-on: ubuntu-latest
    steps:
      - name: Check out verified installer branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Rebuild and verify source archive
        shell: bash
        run: |
          set -euo pipefail
          cat \
            .v20-parts/part-01a.txt \
            .v20-parts/part-01b.txt \
            .v20-parts/part-02.txt \
            .v20-parts/part-03.txt \
            .v20-parts/part-04.txt \
            .v20-parts/part-05.txt \
            .v20-parts/part-06.txt \
            .v20-parts/part-07.txt \
            .v20-parts/part-08.txt \
            .v20-parts/part-09.txt \
            .v20-parts/part-10.txt \
            .v20-parts/part-11.txt \
            .v20-parts/part-12-01.txt \
            .v20-parts/part-12-02.txt \
            .v20-parts/part-12-03.txt \
            .v20-parts/part-12-04.txt \
            .v20-parts/part-12-05.txt \
            .v20-parts/part-12-06.txt \
            .v20-parts/part-12-07.txt \
            .v20-parts/part-12-08.txt \
            .v20-parts/part-13.txt \
            .v20-parts/part-14.txt \
            .v20-parts/part-15-01.txt \
            .v20-parts/part-15-02.txt \
            .v20-parts/part-15-03.txt \
            .v20-parts/part-15-04.txt \
            .v20-parts/part-15-05.txt \
            .v20-parts/part-15-06.txt \
            .v20-parts/part-15-07.txt \
            .v20-parts/part-15-08.txt \
            .v20-parts/part-16.txt \
            .v20-parts/part-17.txt \
            .v20-parts/part-18.txt \
            .v20-parts/part-19.txt \
            .v20-parts/part-20-01.txt \
            .v20-parts/part-20-02.txt > /tmp/club-v20.b64

          echo "0f9fa0420c6eb6a68e1976850e2e95e4dbe3bab871750d4f93e2c9195b968556  /tmp/club-v20.b64" | sha256sum -c -
          base64 --decode /tmp/club-v20.b64 > /tmp/club-v20.tar.xz
          echo "829c41da20f87b8f6e79f741b845b5dfd2945de68f0b6a6bee90c8a75d53e1ba  /tmp/club-v20.tar.xz" | sha256sum -c -

          mkdir /tmp/club-v20
          tar -xJf /tmp/club-v20.tar.xz -C /tmp/club-v20
          cd /tmp/club-v20
          npm install
          npm run build
          rm -rf node_modules dist

      - name: Replace temporary main branch with verified v20
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a /tmp/club-v20/. .
          printf 'node_modules\ndist\n.env\n.DS_Store\n' > .gitignore
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Replace temporary build with Club Dynasty v20.0'
          git push origin HEAD:main
