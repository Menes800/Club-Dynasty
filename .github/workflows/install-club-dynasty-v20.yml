name: Install Club Dynasty v20

on:
  push:
    paths:
      - '.github/workflows/install-club-dynasty-v20.yml'

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild verified v20 archive
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          SHAS=(
            88c4459c6196bb52b9fdb3578e4f19561c140d2b
            0bc65aaf23a0a39bf9d6a37c8808fecbe9923db6
            662a98b7371f1f7deac281ec50ace7d2320ca2a1
            272331b9e9d0a2b22b60ab848047eb58e1427053
            c8e747663690cc1a4005400e8904fa5fc0c9cb12
            c0d9627af7e499faf96085ec6ed4e94a8f3d5db0
            98cadceafae3bbe662911e186559bbeacd5c7de4
            7584a706938d6c4ed08fc6e18e0838f9feb52af4
            d772092e2c34b7707168514510d29479fa92b68a
            cdb040af37ae0fd6eb627d253ea9a0bbc54b3379
            74914a71467af79f89b3e1c016f5c9abacaf0367
            87b0e65f53b74ab2a564a68a05b4407d9bd0b453
            8c459977c6cfe86f01894a9938f05c03c4d52bac
            67de11eb3c27523d3cee74bb586ccb8f5bab5e82
            5368ae68f8d99787fd9066b5e11bf7d30378694f
            35abcaabb41dbadbd9d76978b60f03042813d3bf
            527a58e958831d5d206163a97ddfce18d114e185
            fc955c3774a1ad1df3163dee82b1c786ca591890
          )

          rm -rf /tmp/club-v20 /tmp/club-v20.b64 /tmp/club-v20.tar.bz2
          mkdir -p /tmp/club-v20
          : > /tmp/club-v20.b64

          for sha in "${SHAS[@]}"; do
            gh api "repos/${GITHUB_REPOSITORY}/git/blobs/${sha}" --jq '.content' \
              | tr -d '\n' \
              | base64 --decode \
              >> /tmp/club-v20.b64
          done

          base64 --decode /tmp/club-v20.b64 > /tmp/club-v20.tar.bz2
          tar -xjf /tmp/club-v20.tar.bz2 -C /tmp/club-v20

          cd /tmp/club-v20
          npm install
          npm run build
          rm -rf node_modules dist

          cd "$GITHUB_WORKSPACE"
          find . -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name '.github' \
            -exec rm -rf {} +

          cp -a /tmp/club-v20/. .
          printf 'node_modules\ndist\n.env\n.DS_Store\n' > .gitignore
          rm -f .github/workflows/install-club-dynasty-v20.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Replace temporary build with Club Dynasty v20.0"
          git push
